<div class="grid grid-cols-12 gap-4 px-2 sm:px-4 lg:px-6">
  <div class="w-full max-w-7xl">

    <div class="card p-4 sm:p-6">

      <p-toast></p-toast>

      <p-toolbar styleClass="mb-4">
        <ng-template pTemplate="left">
          <div class="flex flex-wrap gap-2">
            <button 
              pButton pRipple 
              icon="pi pi-filter"
              label="Filtros"
              class="p-button-info"
              pTooltip="Mostrar/Ocultar Filtros"
              (click)="toggleFiltros()">
            </button>
          </div>
        </ng-template>
        <ng-template pTemplate="right">
     
        </ng-template>
      </p-toolbar>
      

      <div *ngIf="mostrarFiltros" class="mt-10 mb-12 flex justify-center">
        <div class="w-full max-w-5xl p-6 bg-white shadow-lg rounded-lg">
          
          <form> 
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

              <div>
                <label for="folio-input" class="block text-sm font-medium text-gray-700">Folio</label>
                <input 
                  id="folio-input"
                  type="text" 
                  pInputText 
                  [(ngModel)]="filtros.folio"
                  name="folio"
                  class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                />
              </div>

              <div>
                <label for="cliente-input" class="block text-sm font-medium text-gray-700">Cliente</label>
                <input 
                  id="cliente-input"
                  type="text" 
                  pInputText 
                  [(ngModel)]="filtros.cliente"
                  name="cliente"
                  class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                />
              </div>

              <div>
                <label for="equipo-input" class="block text-sm font-medium text-gray-700">Equipo</label>
                <input 
                  id="equipo-input"
                  type="text" 
                  pInputText 
                  [(ngModel)]="filtros.equipo"
                  name="equipo"
                  class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                />
              </div>

            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4 items-end"> <div>
                <label for="marca-input" class="block text-sm font-medium text-gray-700">Marca</label>
                <input 
                  id="marca-input"
                  type="text" 
                  pInputText 
                  [(ngModel)]="filtros.marca"
                  name="marca"
                  class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                />
              </div>

             <div>
  <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Creacion</label>
  
  <div class="grid grid-cols-2 gap-4 mt-1">
    
    <div>
      <p-calendar 
        [(ngModel)]="filtros.fechaInicio"
        name="fechaInicio"
        dateFormat="yy-mm-dd"
        placeholder="Inicio" class="w-full"
        [inputStyle]="{'width':'100%'}"
      ></p-calendar>
    </div>

    <div>
      <p-calendar 
        [(ngModel)]="filtros.fechaFin"
        name="fechaFin"
        dateFormat="yy-mm-dd"
        placeholder="Fin" class="w-full"
        [inputStyle]="{'width':'100%'}"
      ></p-calendar>
    </div>

  </div>
</div>

              <div class="flex items-end justify-center md:justify-end gap-4">
                <button 
                  type="button" pButton pRipple 
                  label="Buscar" 
                  icon="pi pi-search"
                  class="p-button-primary w-full md:w-28" 
                  (click)="aplicarFiltros()">
                </button>

                <button 
                  type="button" pButton pRipple 
                  label="Limpiar" 
                  icon="pi pi-times"
                  class="p-button-secondary w-full md:w-28"
                  (click)="limpiarFiltros()">
                </button>
              </div>

            </div>
          </form>

        </div>
      </div>
      
      

<p-toolbar styleClass="mb-4">
        <ng-template pTemplate="left">
          <div class="flex flex-wrap gap-2">
            <button pButton pRipple icon="pi pi-plus" class="p-button-success"
              pTooltip="Agregar Cliente" showDelay="1000" hideDelay="300"
              tooltipPosition="top" (click)="nuevoFolio()"></button>
            <button pButton pRipple icon="pi pi-trash" class="p-button-danger"
              pTooltip="Eliminar Clientes" showDelay="1000" hideDelay="300"
              tooltipPosition="top" (click)="deleteSelectedProducts()"
              [disabled]="!selectedProducts || !selectedProducts.length"></button>
          </div>
        </ng-template>
        <ng-template pTemplate="right">
          <button pButton pRipple label="Exportar" icon="pi pi-upload" class="p-button-help"
            (click)="dt.exportCSV()"></button>
        </ng-template>
      </p-toolbar>

      <div class="mt-10 overflow-x-auto w-full h-[600px]"> <p-table #dt 
          [value]="foliosFiltrados"
          [paginator]="true"
          [rows]="5"
          [rowsPerPageOptions]="[10,20,50]"
          responsiveLayout="scroll"
          styleClass="p-datatable-sm w-full p-datatable-gridlines">

          <ng-template pTemplate="header">
            <tr>
              <th class="px-4 py-3 text-left">Folio</th>
              <th class="px-4 py-3 text-left">Fecha</th>
              <th class="px-4 py-3 text-left">Equipo</th>
              <th class="px-4 py-3 text-left">Marca</th>
              <th class="px-4 py-3 text-left">Modelo</th>
              <th class="px-4 py-3 text-left">N° Serie</th>
              <th class="px-4 py-3 text-left">Cliente</th>
              <th class="px-4 py-3 text-center">Acciones</th> </tr>
          </ng-template>

          <ng-template pTemplate="body" let-folio>
            <tr class="hover:bg-gray-50">

              <td class="px-4 py-2">{{ folio.folio }}</td>
              <td class="px-4 py-2">{{ folio.fecha | date:'yyyy-MM-dd' }}</td>
              <td class="px-4 py-2">{{ folio.tipoEquipo }}</td>
              <td class="px-4 py-2">{{ folio.marca }}</td>
              <td class="px-4 py-2">{{ folio.modelo }}</td>
              <td class="px-4 py-2">{{ folio.numSerie }}</td>
              <td class="px-4 py-2">
                {{ folio.cliente.numCliente }}
              </td>

              <td class="px-4 py-2">
                <div class="flex gap-2 justify-center"> <button 
                    pButton pRipple 
                    icon="pi pi-pencil"
                    class="p-button-rounded p-button-success"
                    pTooltip="Editar"
                    (click)="editarFolio(folio)">
                  </button>

                  <button 
                    pButton pRipple 
                    icon="pi pi-trash"
                    class="p-button-rounded p-button-warning"
                    pTooltip="Eliminar"
                    (click)="eliminarFolio(folio)">
                  </button>
                </div>
              </td>

            </tr>
          </ng-template>

        </p-table>

      </div>

    </div>
  </div>
</div>
